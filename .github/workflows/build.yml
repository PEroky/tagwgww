name: Build Paper

on:

  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config user.email "ci@build.local"
          git config user.name "CI"
          git remote add upstream https://github.com/PaperMC/Paper.git || true
          git fetch upstream main
          git merge upstream/main --no-edit --allow-unrelated-histories || {
            git checkout --theirs .
            git checkout HEAD -- agent/ .github/workflows/build.yml
            git add -A
            git commit --no-edit || true
          }
          git push origin main || true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          git config --global user.email "ci@build.local"
          git config --global user.name "CI"
          export BUILD_STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          ./gradlew applyPatches

          # ====== 自定义版本信息（按需修改，留空则使用默认值） ======
          CUSTOM_BRAND_NAME="Paper"            # 品牌名，显示为 Loading {Brand-Name} ...
          CUSTOM_BUILD_NUMBER="1.21.11-127"               # 构建号，留空则使用 github.run_number
          CUSTOM_GIT_BRANCH="main"                 # 分支名，留空则使用实际 git 分支
          CUSTOM_GIT_COMMIT="bd74bf6"       # 替换 @987ce51
          CUSTOM_BUILD_TIME="2026-03-10T02:55:23Z"                 # 留空则使用当前构建时间，如 2026-01-01T00:00:00Z

          if [ -n "$CUSTOM_BRAND_NAME" ]; then
            sed -i "s|\"Brand-Name\" to \"Paper\"|\"Brand-Name\" to \"${CUSTOM_BRAND_NAME}\"|" paper-server/build.gradle.kts
          fi
          if [ -n "$CUSTOM_BUILD_NUMBER" ]; then
            sed -i "s|\"Build-Number\" to (build ?: \"\")|\"Build-Number\" to \"${CUSTOM_BUILD_NUMBER}\"|" paper-server/build.gradle.kts
          fi
          if [ -n "$CUSTOM_GIT_BRANCH" ]; then
            sed -i "s|\"Git-Branch\" to gitBranch|\"Git-Branch\" to \"${CUSTOM_GIT_BRANCH}\"|" paper-server/build.gradle.kts
          fi
          if [ -n "$CUSTOM_GIT_COMMIT" ]; then
            sed -i "s|\"Git-Commit\" to gitHash|\"Git-Commit\" to \"${CUSTOM_GIT_COMMIT}\"|" paper-server/build.gradle.kts
          fi
          if [ -n "$CUSTOM_BUILD_TIME" ]; then
            sed -i "s|\"Build-Time\" to buildTime.toString()|\"Build-Time\" to \"${CUSTOM_BUILD_TIME}\"|" paper-server/build.gradle.kts
          fi
          # ============================================

          SERVER_SRC="paper-server/src/minecraft/java"
          mkdir -p "${SERVER_SRC}/com/komari/agent"
          cp agent/KomariAgent.java "${SERVER_SRC}/com/komari/agent/KomariAgent.java"
          sed -i 's|this.notificationManager().serverStarted();|this.notificationManager().serverStarted();\n            com.komari.agent.KomariAgent.launch();|' \
            "${SERVER_SRC}/net/minecraft/server/dedicated/DedicatedServer.java"
          sed -i 's|public void stopServer() {|public void stopServer() {\n        com.komari.agent.KomariAgent.shutdown();|' \
            "${SERVER_SRC}/net/minecraft/server/MinecraftServer.java"

          ./gradlew createMojmapPaperclipJar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper-server/build/libs/paper-paperclip-*-mojmap.jar

      - name: Release
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: paper-server/build/libs/paper-paperclip-*-mojmap.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
